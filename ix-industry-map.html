<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="version" content="0.1.12">
<title>Dutch IX Industry Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'GT America Medium';
    src: url('https://www.ciiic.nl/_nuxt/GT-America-Extended-Medium.BqJJQ_OL.woff2') format('woff2');
    font-weight: 500;
    font-style: normal;
    font-display: swap;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ciiic-lime: #C8E641;
    --ciiic-black: #000000;
    --text-primary: #FFFFFF;
    --text-muted: #AAAAAA;
    --border-subtle: rgba(255, 255, 255, 0.1);
    --radius: 0.5rem;
    --radius-sm: 0.375rem;
    --font-heading: 'GT America Medium', 'Inter', sans-serif;
    --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    --vertical-count: 3;
  }

  body {
    font-family: var(--font-body);
    font-size: 14px;
    color: var(--text-primary);
    background: var(--ciiic-black);
    min-height: 100vh;
    padding: 2.5rem 1rem 3rem;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .page {
    max-width: 81rem;
    margin: 0 auto;
    min-height: calc(100vh - 5rem);
    display: flex;
    flex-direction: column;
  }

  header {
    margin-bottom: 1.25rem;
    text-align: center;
  }

  header h1 {
    font-family: var(--font-heading);
    font-size: clamp(1.75rem, 4vw, 2.75rem);
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    line-height: 1.1;
    color: var(--text-primary);
    max-width: 48rem;
    margin: 0 auto;
  }

  header .subheader {
    font-family: var(--font-body);
    font-size: 1rem;
    font-weight: 500;
    color: var(--text-primary);
    margin-top: 0.75rem;
    letter-spacing: 0.01em;
    max-width: 40rem;
    margin-left: auto;
    margin-right: auto;
  }
  header .subheader:empty { display: none; }

  header .intro {
    font-family: var(--font-body);
    font-size: 0.9375rem;
    color: var(--text-primary);
    margin-top: 0.625rem;
    line-height: 1.6;
    max-width: 39rem;
    margin-left: auto;
    margin-right: auto;
  }
  header .intro:empty { display: none; }

  header .intro-version {
    color: var(--text-muted);
  }

  .page-meta {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.625rem;
    margin-top: auto;
    padding-top: 2rem;
    flex-wrap: wrap;
  }

  .badge {
    font-family: var(--font-body);
    font-size: 0.6875rem;
    font-weight: 500;
    padding: 0.35rem 0.75rem;
    border-radius: 9999px;
    border: 1px solid var(--border-subtle);
    color: var(--text-muted);
    background: rgba(255, 255, 255, 0.05);
  }

  .matrix {
    background: var(--ciiic-black);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .layer-block { border-bottom: 1px solid var(--border-subtle); }
  .layer-block:last-child { border-bottom: none; }

  .layer-band {
    padding: 0.875rem 1.25rem;
    font-family: var(--font-heading);
    font-size: 0.8125rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-primary);
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .layer-grid {
    display: grid;
    grid-template-columns: repeat(var(--vertical-count), 1fr);
  }

  .vertical-column {
    display: flex;
    flex-direction: column;
    min-width: 0;
    border-right: 1px solid var(--border-subtle);
  }
  .vertical-column:last-child { border-right: none; }

  .col-head {
    padding: 0.875rem 1rem;
    font-family: var(--font-heading);
    font-size: 0.6875rem;
    font-weight: 500;
    text-align: center;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-primary);
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .col-head .tip-icon,
  .layer-band .tip-icon {
    border-color: rgba(255, 255, 255, 0.4);
    color: rgba(255, 255, 255, 0.85);
  }

  .cell {
    padding: 0.875rem 1rem;
    min-height: 52px;
    color: var(--text-primary);
    flex: 1;
  }

  .glossary-tip { cursor: help; position: relative; }

  .tip-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    font-family: var(--font-body);
    font-size: 9px;
    font-weight: 700;
    line-height: 1;
    flex-shrink: 0;
    opacity: 0.75;
    border: 1px solid currentColor;
  }

  .glossary-popover {
    position: fixed;
    z-index: 1000;
    max-width: 300px;
    padding: 1rem 1.125rem;
    background: #141414;
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
    pointer-events: none;
    border-top: 3px solid var(--ciiic-lime);
  }

  .glossary-popover-title {
    font-family: var(--font-heading);
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-primary);
    margin-bottom: 6px;
  }

  .glossary-popover-body {
    font-family: var(--font-body);
    font-size: 12px;
    line-height: 1.5;
    color: var(--text-muted);
  }

  .glossary-popover-desc { margin-bottom: 0.75rem; color: var(--text-muted); }

  .glossary-popover-status {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 0.75rem;
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 500;
    color: var(--text-primary);
  }

  .glossary-popover-status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .glossary-popover-meta {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
    font-size: 11px;
    color: var(--text-muted);
  }

  .glossary-popover-meta strong {
    color: var(--text-primary);
    font-weight: 600;
  }

  .entry {
    display: flex;
    align-items: flex-start;
    gap: 7px;
    padding: 6px 4px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    cursor: pointer;
    border-radius: var(--radius-sm);
    transition: background 0.15s ease;
  }
  .entry:last-child { border-bottom: none; }
  .entry:hover { background: rgba(255, 255, 255, 0.06); }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 5px;
    background: #888888;
  }

  .entry-text { flex: 1; }
  .entry-name {
    font-family: var(--font-body);
    font-size: 0.8125rem;
    line-height: 1.45;
    color: var(--text-primary);
    font-weight: 500;
  }
  .entry-count {
    font-family: var(--font-body);
    font-size: 0.625rem;
    font-weight: 500;
    color: var(--text-muted);
    background: transparent;
    border: none;
    padding: 2px 0;
    border-radius: 0;
    white-space: nowrap;
    margin-top: 4px;
    display: inline-block;
  }

  .loading { padding: 3rem; text-align: center; font-size: 13px; color: var(--text-muted); }
  .error {
    padding: 2rem;
    font-size: 13px;
    color: #ff9999;
    background: rgba(163, 45, 45, 0.15);
    border-radius: var(--radius);
    border: 1px solid rgba(163, 45, 45, 0.3);
  }

  footer {
    margin-top: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    align-items: center;
    text-align: center;
  }
  .legend {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 1.75rem;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-body);
    font-size: 0.6875rem;
    font-weight: 500;
    color: var(--text-muted);
    cursor: help;
  }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .footer-note {
    font-family: var(--font-body);
    font-size: 0.6875rem;
    color: var(--text-muted);
  }

  @media (max-width: 768px) {
    body { padding: 1.5rem 0.75rem 2rem; }

    header { margin-bottom: 1.75rem; }
    header h1 { font-size: 1.375rem; letter-spacing: 0.05em; }
    header .subheader { font-size: 0.9375rem; }
    header .intro { font-size: 0.875rem; }

    .layer-band {
      padding: 0.75rem 1rem;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
    }

    .layer-grid {
      grid-template-columns: 1fr;
    }

    .vertical-column {
      border-right: none;
      border-bottom: 1px solid var(--border-subtle);
    }
    .vertical-column:last-child { border-bottom: none; }

    .col-head {
      text-align: left;
      justify-content: flex-start;
      padding: 0.75rem 1rem;
      font-size: 0.625rem;
      letter-spacing: 0.08em;
    }

    .cell {
      padding: 0.75rem 1rem;
      min-height: auto;
    }

    .entry-name { font-size: 0.875rem; }

    .legend {
      flex-direction: column;
      align-items: center;
      gap: 0.625rem;
    }

    .glossary-popover {
      max-width: min(300px, calc(100vw - 1.5rem));
    }

    .page-meta { gap: 0.5rem; }
    .badge { font-size: 0.625rem; }
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <h1 id="page-header">Loading…</h1>
    <p class="subheader" id="page-subheader"></p>
    <p class="intro" id="page-intro"></p>
  </header>

  <div class="legend" id="legend"></div>

  <div class="matrix" id="matrix">
    <div id="matrix-body"><div class="loading">Loading data…</div></div>
  </div>

  <footer>
    <div class="footer-note" id="footer-note"></div>
  </footer>

  <div class="page-meta">
    <span class="badge" id="layer-count-badge">Loading…</span>
    <span class="badge" id="vertical-count-badge"></span>
    <span class="badge" id="entry-count-badge"></span>
    <span class="badge" id="org-count-badge"></span>
    <span class="badge" id="last-updated"></span>
  </div>

</div>

<script>
const SHEET_ID = '1yYDiayOy2ReCqcbBjUYTi9czT9pLElt5Kuks42WroE0';

const VERTICAL_PALETTE = [
  {
    subheader: '#3D6B55',
    cells: ['#2C4A3E', '#1E3329', '#121F18']
  },
  {
    subheader: '#6B6B1A',
    cells: ['#4A4A1A', '#333310', '#1F1F08']
  },
  {
    subheader: '#3D2B5C',
    cells: ['#2A1F3D', '#1C1428', '#0F0B15']
  }
];

const LAYER_BAND_COLORS = ['#1A2B22', '#141E1A', '#0D1210'];

const CIIIC_LIME = '#C8E641';

function verticalTheme(verticalIndex, layerIndex) {
  const vertical = VERTICAL_PALETTE[verticalIndex % VERTICAL_PALETTE.length];
  const cellBg = vertical.cells[layerIndex] ?? vertical.cells[vertical.cells.length - 1];
  return {
    headerBg: vertical.subheader,
    headerColor: '#FFFFFF',
    cellBg
  };
}

async function fetchSheet(tabName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(tabName)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status} for ${tabName}`);
  const text = await res.text();
  const json = JSON.parse(text.substring(47).slice(0, -2));
  const rawRows = json.table.rows.filter(r => r.c && r.c.some(cell => cell && cell.v !== null));

  let cols = json.table.cols.map(c => c.label);
  let dataRows = rawRows;

  if (cols.every(label => !label) && rawRows.length > 0) {
    cols = rawRows[0].c.map(cell => (cell && cell.v != null) ? String(cell.v) : '');
    dataRows = rawRows.slice(1);
  }

  return dataRows.map(r => {
    const obj = {};
    r.c.forEach((cell, i) => { if (cols[i]) obj[cols[i]] = cell ? cell.v : null; });
    return obj;
  });
}

function parseGlossary(rows) {
  const map = {};
  rows.forEach(row => {
    if (row['Term']) map[row['Term']] = row['Description'] || '';
  });
  return map;
}

function applyPageCopy(glossary) {
  const header = glossary['Header'] || 'Dutch IX industry map';
  const subheader = glossary['Subheader'] || '';
  const intro = glossary['Intro'] || '';
  const version = document.querySelector('meta[name="version"]')?.content || '';

  document.title = header;
  document.getElementById('page-header').textContent = header;
  document.getElementById('page-subheader').textContent = subheader;

  const introEl = document.getElementById('page-intro');
  introEl.textContent = '';
  if (intro) introEl.append(document.createTextNode(intro));
  if (version) {
    const versionSpan = document.createElement('span');
    versionSpan.className = 'intro-version';
    versionSpan.textContent = (intro ? ' · ' : '') + `Version ${version}`;
    introEl.appendChild(versionSpan);
  }
}

let glossaryPopover = null;
let glossaryHideTimer = null;
let glossaryPinned = false;

function initGlossaryPopover() {
  if (glossaryPopover) return;
  glossaryPopover = document.createElement('div');
  glossaryPopover.id = 'glossary-popover';
  glossaryPopover.className = 'glossary-popover';
  glossaryPopover.hidden = true;
  glossaryPopover.innerHTML = '<div class="glossary-popover-title"></div><div class="glossary-popover-body"></div>';
  document.body.appendChild(glossaryPopover);

  glossaryPopover.addEventListener('mouseenter', () => clearTimeout(glossaryHideTimer));
  glossaryPopover.addEventListener('mouseleave', () => {
    if (!glossaryPinned) hideGlossaryPopover();
  });

  document.addEventListener('click', (e) => {
    if (glossaryPinned && !e.target.closest('.glossary-tip') && !e.target.closest('.glossary-popover')) {
      glossaryPinned = false;
      hideGlossaryPopover();
    }
  });
}

function resolveGlossaryText(glossary, keys, fallback) {
  for (const key of keys) {
    if (glossary[key]) return { term: key, text: glossary[key] };
  }
  if (fallback) return { term: keys[0] || 'Info', text: fallback };
  return null;
}

function positionGlossaryPopover(el) {
  const rect = el.getBoundingClientRect();
  const pop = glossaryPopover;
  pop.hidden = false;
  const margin = 10;
  let top = rect.bottom + margin;
  let left = rect.left + rect.width / 2 - pop.offsetWidth / 2;

  if (left + pop.offsetWidth > window.innerWidth - margin) {
    left = window.innerWidth - pop.offsetWidth - margin;
  }
  if (left < margin) left = margin;

  if (top + pop.offsetHeight > window.innerHeight - margin) {
    top = rect.top - pop.offsetHeight - margin;
  }

  pop.style.top = `${top}px`;
  pop.style.left = `${left}px`;
}

function showGlossaryPopover(el, term, text) {
  if (!text) return;
  clearTimeout(glossaryHideTimer);
  initGlossaryPopover();
  glossaryPopover.querySelector('.glossary-popover-title').textContent = term;
  glossaryPopover.querySelector('.glossary-popover-body').textContent = text;
  glossaryPopover.hidden = false;
  positionGlossaryPopover(el);
}

function formatRecordCount(count) {
  return `${count} Record${count !== 1 ? 's' : ''}`;
}

function showEntryPopover(el, entry, layer, vertical, count, statusLabel) {
  clearTimeout(glossaryHideTimer);
  initGlossaryPopover();

  const title = (entry['Entry'] || '').replace(/\*+$/, '').trim();
  glossaryPopover.querySelector('.glossary-popover-title').textContent = title;

  const body = glossaryPopover.querySelector('.glossary-popover-body');
  body.innerHTML = '';

  if (statusLabel) {
    const statusRow = document.createElement('div');
    statusRow.className = 'glossary-popover-status';

    const statusDot = document.createElement('span');
    statusDot.className = 'glossary-popover-status-dot';
    statusDot.style.background = statusDotColor(statusLabel);

    const statusText = document.createElement('span');
    statusText.textContent = statusLabel;

    statusRow.append(statusDot, statusText);
    body.appendChild(statusRow);
  }

  const description = entry['Description'] || '';
  if (description) {
    const desc = document.createElement('p');
    desc.className = 'glossary-popover-desc';
    desc.textContent = description;
    body.appendChild(desc);
  }

  const meta = document.createElement('div');
  meta.className = 'glossary-popover-meta';

  const verticalLine = document.createElement('div');
  verticalLine.innerHTML = '<strong>Vertical:</strong> ';
  verticalLine.append(document.createTextNode(vertical.name));

  const layerLine = document.createElement('div');
  layerLine.innerHTML = '<strong>Layer:</strong> ';
  layerLine.append(document.createTextNode(layer.name));

  const recordsLine = document.createElement('div');
  recordsLine.textContent = formatRecordCount(count);

  meta.append(verticalLine, layerLine, recordsLine);
  body.appendChild(meta);

  glossaryPopover.hidden = false;
  positionGlossaryPopover(el);
}

function hideGlossaryPopover() {
  clearTimeout(glossaryHideTimer);
  if (glossaryPopover) glossaryPopover.hidden = true;
}

function scheduleHideGlossaryPopover() {
  clearTimeout(glossaryHideTimer);
  if (!glossaryPinned) {
    glossaryHideTimer = setTimeout(hideGlossaryPopover, 120);
  }
}

function attachPopoverTip(el, open) {
  el.classList.add('glossary-tip');
  el.setAttribute('tabindex', '0');
  el.setAttribute('role', 'button');
  el.setAttribute('aria-describedby', 'glossary-popover');

  const pin = (e) => {
    e.stopPropagation();
    glossaryPinned = !glossaryPinned;
    if (glossaryPinned) open();
    else hideGlossaryPopover();
  };

  el.addEventListener('mouseenter', open);
  el.addEventListener('mouseleave', scheduleHideGlossaryPopover);
  el.addEventListener('focus', open);
  el.addEventListener('blur', scheduleHideGlossaryPopover);
  el.addEventListener('click', pin);
  el.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      pin(e);
    }
  });
}

function attachGlossaryTip(el, glossary, keys, fallback, showIcon) {
  const resolved = resolveGlossaryText(glossary, keys, fallback);
  if (!resolved || !resolved.text) return;

  if (showIcon) {
    const icon = document.createElement('span');
    icon.className = 'tip-icon';
    icon.textContent = '?';
    icon.setAttribute('aria-hidden', 'true');
    el.appendChild(icon);
  }

  attachPopoverTip(el, () => showGlossaryPopover(el, resolved.term, resolved.text));
}

function attachEntryTip(el, entry, layer, vertical, count, statusLabel) {
  attachPopoverTip(el, () => showEntryPopover(el, entry, layer, vertical, count, statusLabel));
}

function layerGlossaryKeys(layer) {
  return [layer.name, layer.name.replace(/\s*layer\s*$/i, ' Layer'), 'Layer'];
}

function verticalGlossaryKeys(vertical) {
  return [`${vertical.name} vertical`, vertical.name, 'Vertical'];
}

function statusDotColor(statusLabel) {
  const label = (statusLabel || '').toLowerCase();
  if (label.includes('validated')) return CIIIC_LIME;
  if (label.includes('under review') || label.includes('review')) return '#888888';
  if (label.includes('not active')) return '#666666';
  if (label.includes('only international')) return '#555555';
  return '#888888';
}

function renderFooterNote(glossary) {
  const footerNote = document.getElementById('footer-note');
  if (!footerNote) return;
  footerNote.innerHTML = '';

  const star = document.createElement('span');
  star.textContent = '*';
  if (glossary['* (asterisk on entry)']) {
    attachGlossaryTip(star, glossary, ['* (asterisk on entry)'], glossary['* (asterisk on entry)'], false);
  }
  footerNote.appendChild(star);
  footerNote.append(' active across multiple verticals \u00a0·\u00a0 ');

  const copyright = document.createElement('span');
  copyright.textContent = glossary['Copyright'] || '';
  footerNote.appendChild(copyright);
}

function renderLegend(statuses, glossary) {
  const legend = document.getElementById('legend');
  legend.innerHTML = '';

  statuses.forEach((status, index) => {
    const item = document.createElement('div');
    item.className = 'legend-item';

    const dot = document.createElement('div');
    dot.className = 'legend-dot';
    dot.style.background = statusDotColor(status.label);

    const label = document.createElement('span');
    label.textContent = status.label;

    item.appendChild(dot);
    item.appendChild(label);
    attachGlossaryTip(item, glossary, [status.label], status.description, false);
    legend.appendChild(item);
  });
}

function renderMatrix(layers, verticals, entries, statusMap, statusIndexById, orgCountMap, glossary) {
  const body = document.getElementById('matrix-body');
  body.innerHTML = '';

  layers.forEach((layer, layerIndex) => {
    const block = document.createElement('div');
    block.className = 'layer-block';

    const band = document.createElement('div');
    band.className = 'layer-band';
    band.style.background = LAYER_BAND_COLORS[layerIndex] ?? LAYER_BAND_COLORS[LAYER_BAND_COLORS.length - 1];
    band.style.color = '#FFFFFF';
    band.appendChild(document.createTextNode(layer.name));
    attachGlossaryTip(band, glossary, layerGlossaryKeys(layer), layer.description, true);
    block.appendChild(band);

    const layerGrid = document.createElement('div');
    layerGrid.className = 'layer-grid';

    verticals.forEach((vertical, verticalIndex) => {
      const theme = verticalTheme(verticalIndex, layerIndex);
      const column = document.createElement('div');
      column.className = 'vertical-column';

      const col = document.createElement('div');
      col.className = 'col-head';
      col.style.background = theme.headerBg;
      col.style.color = theme.headerColor;
      col.appendChild(document.createTextNode(vertical.name));
      attachGlossaryTip(col, glossary, verticalGlossaryKeys(vertical), vertical.description, true);
      column.appendChild(col);

      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.style.background = theme.cellBg;

      const cellEntries = entries.filter(e => e['Layer'] === layer.id && e['Vertical'] === vertical.id);

      cellEntries.forEach(entry => {
        const count = orgCountMap[entry['Entry_ID']] || 0;
        const statusLabel = statusMap[entry['Validation Status']] || '';

        const el = document.createElement('div');
        el.className = 'entry';

        const dot = document.createElement('div');
        dot.className = 'dot';
        dot.style.background = statusDotColor(statusLabel);

        const text = document.createElement('div');
        text.className = 'entry-text';

        const name = document.createElement('div');
        name.className = 'entry-name';
        name.textContent = entry['Entry'] || '';

        const countBadge = document.createElement('div');
        countBadge.className = 'entry-count';
        countBadge.textContent = count === 0 ? '0 records' : `${count} record${count > 1 ? 's' : ''}`;

        text.appendChild(name);
        text.appendChild(countBadge);
        el.appendChild(dot);
        el.appendChild(text);
        attachEntryTip(el, entry, layer, vertical, count, statusLabel);

        cell.appendChild(el);
      });

      if (cellEntries.length === 0) {
        cell.innerHTML = '<span style="font-size:11px;color:rgba(255,255,255,0.2);">—</span>';
      }

      column.appendChild(cell);
      layerGrid.appendChild(column);
    });

    block.appendChild(layerGrid);
    body.appendChild(block);
  });
}

async function init() {
  try {
    const [layersRaw, verticalsRaw, entries, orgEntries, statusesRaw, glossaryRaw] = await Promise.all([
      fetchSheet('Layers'),
      fetchSheet('Verticals'),
      fetchSheet('Entries'),
      fetchSheet('Org_Entries'),
      fetchSheet('ReviewStatuses'),
      fetchSheet('Glossary')
    ]);

    const glossary = parseGlossary(glossaryRaw);
    applyPageCopy(glossary);
    initGlossaryPopover();

    const layers = layersRaw
      .filter(row => row['Layer_ID'])
      .map(row => ({
        id: row['Layer_ID'],
        name: row['Layer'] || row['Layer_ID'],
        description: row['Description'] || ''
      }));

    const verticals = verticalsRaw
      .filter(row => row['Vertical_ID'])
      .map(row => ({
        id: row['Vertical_ID'],
        name: row['Vertical'] || row['Vertical_ID'],
        description: row['Description'] || ''
      }));

    const statuses = statusesRaw
      .filter(row => row['ReviewStatus_ID'])
      .map(row => ({
        id: row['ReviewStatus_ID'],
        label: row['Review Status'] || row['ReviewStatus_ID'],
        description: row['Description'] || ''
      }));

    const statusMap = {};
    const statusIndexById = {};
    statuses.forEach((status, index) => {
      statusMap[status.id] = status.label;
      statusIndexById[status.id] = index;
    });

    const orgCountMap = {};
    orgEntries.forEach(link => {
      const eid = link['Entry_ID'];
      if (eid) orgCountMap[eid] = (orgCountMap[eid] || 0) + 1;
    });

    document.documentElement.style.setProperty('--vertical-count', verticals.length);

    document.getElementById('layer-count-badge').textContent = `${layers.length} layer${layers.length !== 1 ? 's' : ''}`;
    document.getElementById('vertical-count-badge').textContent = `${verticals.length} vertical${verticals.length !== 1 ? 's' : ''}`;
    document.getElementById('entry-count-badge').textContent = `${entries.length} entr${entries.length !== 1 ? 'ies' : 'y'}`;
    const totalOrgs = new Set(orgEntries.map(l => l['Organization_ID']).filter(Boolean)).size;
    document.getElementById('org-count-badge').textContent = `${totalOrgs} organisation${totalOrgs !== 1 ? 's' : ''}`;
    document.getElementById('last-updated').textContent = `Updated ${new Date().toLocaleDateString('en-NL', { day: 'numeric', month: 'short', year: 'numeric' })}`;

    renderLegend(statuses, glossary);
    renderFooterNote(glossary);
    renderMatrix(layers, verticals, entries, statusMap, statusIndexById, orgCountMap, glossary);

  } catch (e) {
    document.getElementById('matrix-body').innerHTML = `<div class="error">Could not load data. Make sure the Google Sheet is publicly readable (Share → Anyone with the link → Viewer).<br><br>Error: ${e.message}</div>`;
    console.error(e);
  }
}

init();
</script>
