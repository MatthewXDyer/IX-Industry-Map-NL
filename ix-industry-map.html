<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dutch IX Industry Map</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue-50: #E6F1FB; --blue-800: #0C447C;
    --green-50: #EAF3DE; --green-800: #27500A;
    --amber-50: #FAEEDA; --amber-800: #633806;
    --purple-50: #F3E8FF; --purple-800: #5B21B6;
    --rose-50: #FFE4E6; --rose-800: #9F1239;
    --teal-50: #CCFBF1; --teal-800: #115E59;
    --gray-100: #D3D1C7; --gray-200: #B4B2A9; --gray-600: #5F5E5A;
    --green-600: #3B6D11;
    --border: rgba(0,0,0,0.12);
    --bg: #ffffff;
    --bg-secondary: #F7F6F2;
    --text: #1a1a18;
    --text-muted: #5F5E5A;
    --radius: 10px;
    --row-head-width: 130px;
    --vertical-count: 3;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--bg-secondary);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .page { max-width: 1100px; margin: 0 auto; }

  header { margin-bottom: 2rem; padding-bottom: 1.25rem; border-bottom: 0.5px solid var(--border); }
  header h1 { font-size: 22px; font-weight: 500; letter-spacing: -0.3px; }
  header p { font-size: 13px; color: var(--text-muted); margin-top: 5px; }
  .header-meta { display: flex; align-items: center; gap: 0.75rem; margin-top: 0.75rem; flex-wrap: wrap; }
  .badge { font-size: 11px; padding: 3px 9px; border-radius: 20px; border: 0.5px solid var(--border); color: var(--text-muted); background: var(--bg); }

  .matrix { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }

  .matrix-head,
  .matrix-row {
    display: grid;
    grid-template-columns: var(--row-head-width) repeat(var(--vertical-count), 1fr);
  }

  .matrix-head .corner { background: var(--bg-secondary); border-right: 0.5px solid var(--border); border-bottom: 0.5px solid var(--border); }
  .col-head {
    padding: 12px 14px;
    font-size: 11px;
    font-weight: 500;
    text-align: center;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    border-bottom: 0.5px solid var(--border);
    border-right: 0.5px solid var(--border);
  }
  .col-head:last-child { border-right: none; }

  .matrix-row { border-bottom: 0.5px solid var(--border); }
  .matrix-row:last-child { border-bottom: none; }

  .row-head {
    padding: 14px 12px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    background: var(--bg-secondary);
    border-right: 0.5px solid var(--border);
    display: flex;
    align-items: flex-start;
    line-height: 1.4;
  }

  .cell { padding: 10px 12px; border-right: 0.5px solid var(--border); }
  .cell:last-child { border-right: none; }

  .entry { display: flex; align-items: flex-start; gap: 7px; padding: 5px 3px; border-bottom: 0.5px solid rgba(0,0,0,0.06); cursor: pointer; border-radius: 4px; transition: background 0.1s; }
  .entry:last-child { border-bottom: none; }
  .entry:hover { background: var(--bg-secondary); }

  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; background: var(--gray-200); }

  .entry-text { flex: 1; }
  .entry-name { font-size: 11.5px; line-height: 1.4; color: var(--text); }
  .entry-name.multi { color: var(--text-muted); font-style: italic; }
  .entry-count { font-size: 10px; color: var(--text-muted); background: var(--bg-secondary); border: 0.5px solid var(--border); padding: 1px 6px; border-radius: 10px; white-space: nowrap; margin-top: 3px; display: inline-block; }

  .loading { padding: 3rem; text-align: center; font-size: 13px; color: var(--text-muted); }
  .error { padding: 2rem; font-size: 13px; color: #A32D2D; background: #FCEBEB; border-radius: var(--radius); }

  footer { margin-top: 1.5rem; display: flex; gap: 1.5rem; flex-wrap: wrap; align-items: center; }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .footer-note { font-size: 11px; color: var(--text-muted); margin-left: auto; }
</style>
</head>
<body>
<div class="page">

  <header>
    <h1>Dutch IX industry map</h1>
    <p>Immersive Experience sector in the Netherlands — organisations mapped by layer and entry type</p>
    <div class="header-meta">
      <span class="badge" id="layer-count-badge">Loading…</span>
      <span class="badge" id="vertical-count-badge"></span>
      <span class="badge" id="entry-count-badge"></span>
      <span class="badge" id="org-count-badge"></span>
      <span class="badge" id="last-updated"></span>
    </div>
  </header>

  <div class="matrix" id="matrix">
    <div class="matrix-head" id="matrix-head">
      <div class="corner"></div>
    </div>
    <div id="matrix-body"><div class="loading">Loading data…</div></div>
  </div>

  <footer>
    <div class="legend" id="legend"></div>
    <div class="footer-note">* active across multiple verticals &nbsp;·&nbsp; Data: CIIIC / Redactielokaal</div>
  </footer>

</div>

<script>
const SHEET_ID = '1yYDiayOy2ReCqcbBjUYTi9czT9pLElt5Kuks42WroE0';

const VERTICAL_PALETTE = [
  { bg: 'var(--blue-50)', color: 'var(--blue-800)' },
  { bg: 'var(--green-50)', color: 'var(--green-800)' },
  { bg: 'var(--amber-50)', color: 'var(--amber-800)' },
  { bg: 'var(--purple-50)', color: 'var(--purple-800)' },
  { bg: 'var(--rose-50)', color: 'var(--rose-800)' },
  { bg: 'var(--teal-50)', color: 'var(--teal-800)' }
];

const STATUS_DOT_COLORS = [
  'var(--gray-200)',
  'var(--green-600)',
  'var(--gray-100)',
  'var(--gray-600)'
];

async function fetchSheet(tabName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(tabName)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status} for ${tabName}`);
  const text = await res.text();
  const json = JSON.parse(text.substring(47).slice(0, -2));
  const rawRows = json.table.rows.filter(r => r.c && r.c.some(cell => cell && cell.v !== null));

  let cols = json.table.cols.map(c => c.label);
  let dataRows = rawRows;

  if (cols.every(label => !label) && rawRows.length > 0) {
    cols = rawRows[0].c.map(cell => (cell && cell.v != null) ? String(cell.v) : '');
    dataRows = rawRows.slice(1);
  }

  return dataRows.map(r => {
    const obj = {};
    r.c.forEach((cell, i) => { if (cols[i]) obj[cols[i]] = cell ? cell.v : null; });
    return obj;
  });
}

function statusDotColor(statusLabel, index) {
  const label = (statusLabel || '').toLowerCase();
  if (label.includes('validated')) return 'var(--green-600)';
  if (label.includes('only international')) return 'var(--gray-600)';
  if (label.includes('not active')) return 'var(--gray-100)';
  if (label.includes('under review') || label.includes('review')) return 'var(--gray-200)';
  return STATUS_DOT_COLORS[index % STATUS_DOT_COLORS.length];
}

function renderMatrixHead(verticals) {
  const head = document.getElementById('matrix-head');
  head.innerHTML = '<div class="corner"></div>';

  verticals.forEach((vertical, index) => {
    const palette = VERTICAL_PALETTE[index % VERTICAL_PALETTE.length];
    const col = document.createElement('div');
    col.className = 'col-head';
    col.textContent = vertical.name;
    col.title = vertical.description || '';
    col.style.background = palette.bg;
    col.style.color = palette.color;
    head.appendChild(col);
  });
}

function renderLegend(statuses) {
  const legend = document.getElementById('legend');
  legend.innerHTML = '';

  statuses.forEach((status, index) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.title = status.description || '';

    const dot = document.createElement('div');
    dot.className = 'legend-dot';
    dot.style.background = statusDotColor(status.label, index);

    const label = document.createElement('span');
    label.textContent = status.label;

    item.appendChild(dot);
    item.appendChild(label);
    legend.appendChild(item);
  });
}

function renderMatrix(layers, verticals, entries, statusMap, statusIndexById, orgCountMap) {
  const body = document.getElementById('matrix-body');
  body.innerHTML = '';

  layers.forEach(layer => {
    const row = document.createElement('div');
    row.className = 'matrix-row';

    const rowHead = document.createElement('div');
    rowHead.className = 'row-head';
    rowHead.textContent = layer.name;
    rowHead.title = layer.description || '';
    row.appendChild(rowHead);

    verticals.forEach(vertical => {
      const cell = document.createElement('div');
      cell.className = 'cell';

      const cellEntries = entries.filter(e => e['Layer'] === layer.id && e['Vertical'] === vertical.id);

      cellEntries.forEach(entry => {
        const statusId = entry['Validation Status'];
        const statusLabel = statusMap[statusId] || '';
        const statusIndex = statusIndexById[statusId] ?? 0;
        const count = orgCountMap[entry['Entry_ID']] || 0;
        const isMulti = entry['Entry'] && entry['Entry'].includes('*');

        const el = document.createElement('div');
        el.className = 'entry';
        el.title = entry['Description'] || '';

        const dot = document.createElement('div');
        dot.className = 'dot';
        dot.style.background = statusDotColor(statusLabel, statusIndex);

        const text = document.createElement('div');
        text.className = 'entry-text';

        const name = document.createElement('div');
        name.className = 'entry-name' + (isMulti ? ' multi' : '');
        name.textContent = entry['Entry'] || '';

        const countBadge = document.createElement('div');
        countBadge.className = 'entry-count';
        countBadge.textContent = count === 0 ? '0 orgs' : `${count} org${count > 1 ? 's' : ''}`;

        text.appendChild(name);
        text.appendChild(countBadge);
        el.appendChild(dot);
        el.appendChild(text);
        cell.appendChild(el);
      });

      if (cellEntries.length === 0) {
        cell.innerHTML = '<span style="font-size:11px;color:var(--gray-100);">—</span>';
      }

      row.appendChild(cell);
    });

    body.appendChild(row);
  });
}

async function init() {
  try {
    const [layersRaw, verticalsRaw, entries, orgEntries, statusesRaw] = await Promise.all([
      fetchSheet('Layers'),
      fetchSheet('Verticals'),
      fetchSheet('Entries'),
      fetchSheet('Org_Entries'),
      fetchSheet('ReviewStatuses')
    ]);

    const layers = layersRaw
      .filter(row => row['Layer_ID'])
      .map(row => ({
        id: row['Layer_ID'],
        name: row['Layer'] || row['Layer_ID'],
        description: row['Description'] || ''
      }));

    const verticals = verticalsRaw
      .filter(row => row['Vertical_ID'])
      .map(row => ({
        id: row['Vertical_ID'],
        name: row['Vertical'] || row['Vertical_ID'],
        description: row['Description'] || ''
      }));

    const statuses = statusesRaw
      .filter(row => row['ReviewStatus_ID'])
      .map(row => ({
        id: row['ReviewStatus_ID'],
        label: row['Review Status'] || row['ReviewStatus_ID'],
        description: row['Description'] || ''
      }));

    const statusMap = {};
    const statusIndexById = {};
    statuses.forEach((status, index) => {
      statusMap[status.id] = status.label;
      statusIndexById[status.id] = index;
    });

    const orgCountMap = {};
    orgEntries.forEach(link => {
      const eid = link['Entry_ID'];
      if (eid) orgCountMap[eid] = (orgCountMap[eid] || 0) + 1;
    });

    document.documentElement.style.setProperty('--vertical-count', verticals.length);

    document.getElementById('layer-count-badge').textContent = `${layers.length} layer${layers.length !== 1 ? 's' : ''}`;
    document.getElementById('vertical-count-badge').textContent = `${verticals.length} vertical${verticals.length !== 1 ? 's' : ''}`;
    document.getElementById('entry-count-badge').textContent = `${entries.length} entr${entries.length !== 1 ? 'ies' : 'y'}`;
    const totalOrgs = new Set(orgEntries.map(l => l['Organization_ID']).filter(Boolean)).size;
    document.getElementById('org-count-badge').textContent = `${totalOrgs} organisation${totalOrgs !== 1 ? 's' : ''}`;
    document.getElementById('last-updated').textContent = `Updated ${new Date().toLocaleDateString('en-NL', { day: 'numeric', month: 'short', year: 'numeric' })}`;

    renderMatrixHead(verticals);
    renderLegend(statuses);
    renderMatrix(layers, verticals, entries, statusMap, statusIndexById, orgCountMap);

  } catch (e) {
    document.getElementById('matrix-body').innerHTML = `<div class="error">Could not load data. Make sure the Google Sheet is publicly readable (Share → Anyone with the link → Viewer).<br><br>Error: ${e.message}</div>`;
    console.error(e);
  }
}

init();
</script>
</body>
</html>
