<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dutch IX Industry Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* CIIIC-inspired tokens (from ciiic.nl design system) */
    --ciiic-darkest: #141513;
    --ciiic-lightest: #ffffff;
    --ciiic-primary: #e2fe52;
    --ciiic-primary-light: #f0fbba;
    --ciiic-primary-dark: #a3c400;
    --ciiic-secondary: #39766d;
    --ciiic-gray-100: #f4f5f9;
    --ciiic-gray-300: #e3e3e3;
    --ciiic-gray-600: #727272;
    --ciiic-gray-900: #4a4a49;
    --ciiic-success: #009623;
    --ciiic-info: #a79cf0;
    --ciiic-warning: #ffc631;

    --blue-50: #E6F1FB; --blue-800: #0C447C;
    --green-50: #EAF3DE; --green-800: #27500A;
    --amber-50: #FAEEDA; --amber-800: #633806;
    --gray-100: #D3D1C7; --gray-200: #B4B2A9; --gray-600: #5F5E5A;
    --green-600: var(--ciiic-success);
    --border: rgba(20, 21, 19, 0.1);
    --bg: var(--ciiic-lightest);
    --bg-secondary: var(--ciiic-gray-100);
    --text: var(--ciiic-darkest);
    --text-muted: var(--ciiic-gray-900);
    --radius: 1rem;
    --radius-sm: 0.5rem;
    --shadow-light: 0 0 8px rgba(0, 0, 0, 0.06);
    --shadow-card: 0 8px 24px rgba(0, 0, 0, 0.08);
    --vertical-count: 3;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--bg-secondary);
    min-height: 100vh;
    padding: 2.5rem 1rem 3rem;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .page {
    max-width: 81rem;
    margin: 0 auto;
    min-height: calc(100vh - 5rem);
    display: flex;
    flex-direction: column;
  }

  header {
    margin-bottom: 2.5rem;
    padding-bottom: 2rem;
    text-align: center;
  }

  header h1 {
    font-size: clamp(1.75rem, 4vw, 2.75rem);
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    line-height: 1.1;
    max-width: 48rem;
    margin: 0 auto;
  }

  header .subheader {
    font-size: 1rem;
    font-weight: 500;
    color: var(--ciiic-secondary);
    margin-top: 0.75rem;
    letter-spacing: 0.01em;
    max-width: 40rem;
    margin-left: auto;
    margin-right: auto;
  }
  header .subheader:empty { display: none; }

  header .intro {
    font-size: 0.9375rem;
    color: var(--text-muted);
    margin-top: 0.625rem;
    line-height: 1.6;
    max-width: 39rem;
    margin-left: auto;
    margin-right: auto;
  }
  header .intro:empty { display: none; }

  .page-meta {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.625rem;
    margin-top: auto;
    padding-top: 2rem;
    flex-wrap: wrap;
  }

  .badge {
    font-size: 0.6875rem;
    font-weight: 500;
    padding: 0.35rem 0.75rem;
    border-radius: 9999px;
    border: none;
    color: var(--ciiic-gray-900);
    background: var(--ciiic-lightest);
    box-shadow: var(--shadow-light);
  }

  .matrix {
    background: var(--bg);
    border: none;
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-card);
  }

  .layer-block { border-bottom: 1px solid var(--ciiic-gray-300); }
  .layer-block:last-child { border-bottom: none; }

  .layer-band {
    padding: 0.875rem 1.25rem;
    font-size: 0.8125rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border-left: 4px solid var(--ciiic-primary);
  }

  .matrix-row {
    display: grid;
    grid-template-columns: repeat(var(--vertical-count), 1fr);
  }

  .col-head {
    padding: 0.875rem 1rem;
    font-size: 0.6875rem;
    font-weight: 600;
    text-align: center;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #ffffff;
    border-bottom: 1px solid rgba(255, 255, 255, 0.14);
    border-right: 1px solid rgba(255, 255, 255, 0.14);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .col-head:last-child { border-right: none; }

  .col-head .tip-icon {
    border-color: rgba(255, 255, 255, 0.55);
    color: rgba(255, 255, 255, 0.92);
  }

  .cell { padding: 0.875rem 1rem; border-right: 1px solid rgba(20, 21, 19, 0.08); min-height: 52px; }
  .cell:last-child { border-right: none; }

  .glossary-tip {
    cursor: help;
    position: relative;
  }

  .tip-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    font-size: 9px;
    font-weight: 700;
    line-height: 1;
    flex-shrink: 0;
    opacity: 0.75;
    border: 1px solid currentColor;
  }

  .layer-band .tip-icon {
    border-color: rgba(255,255,255,0.55);
    color: rgba(255,255,255,0.9);
  }

  .glossary-popover {
    position: fixed;
    z-index: 1000;
    max-width: 300px;
    padding: 1rem 1.125rem;
    background: var(--bg);
    border: none;
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow-card);
    pointer-events: none;
    border-top: 3px solid var(--ciiic-primary);
  }

  .glossary-popover-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    color: var(--text);
    margin-bottom: 6px;
  }

  .glossary-popover-body {
    font-size: 12px;
    line-height: 1.5;
    color: var(--text-muted);
  }

  .glossary-popover-desc {
    margin-bottom: 0.75rem;
  }

  .glossary-popover-meta {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
    font-size: 11px;
  }

  .glossary-popover-meta strong {
    color: var(--text);
    font-weight: 600;
  }

  .entry { display: flex; align-items: flex-start; gap: 7px; padding: 6px 4px; border-bottom: 1px solid rgba(20, 21, 19, 0.06); cursor: pointer; border-radius: var(--radius-sm); transition: background 0.15s ease; }
  .entry:last-child { border-bottom: none; }
  .entry:hover { background: rgba(255, 255, 255, 0.35); }

  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; background: var(--gray-200); }

  .entry-text { flex: 1; }
  .entry-name { font-size: 0.8125rem; line-height: 1.45; color: var(--text); font-weight: 500; }
  .entry-count {
    font-size: 0.625rem;
    font-weight: 500;
    color: var(--ciiic-gray-900);
    background: rgba(255, 255, 255, 0.7);
    border: none;
    padding: 2px 8px;
    border-radius: 9999px;
    white-space: nowrap;
    margin-top: 4px;
    display: inline-block;
    box-shadow: var(--shadow-light);
  }

  .loading { padding: 3rem; text-align: center; font-size: 13px; color: var(--text-muted); }
  .error { padding: 2rem; font-size: 13px; color: #A32D2D; background: #FCEBEB; border-radius: var(--radius); }

  footer {
    margin-top: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    align-items: center;
    text-align: center;
  }
  .legend { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.6875rem; font-weight: 500; color: var(--text-muted); cursor: help; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .footer-note { font-size: 0.6875rem; color: var(--ciiic-gray-600); }
</style>
</head>
<body>
<div class="page">

  <header>
    <h1 id="page-header">Loading…</h1>
    <p class="subheader" id="page-subheader"></p>
    <p class="intro" id="page-intro"></p>
  </header>

  <div class="matrix" id="matrix">
    <div id="matrix-body"><div class="loading">Loading data…</div></div>
  </div>

  <footer>
    <div class="legend" id="legend"></div>
    <div class="footer-note" id="footer-note"></div>
  </footer>

  <div class="page-meta">
    <span class="badge" id="layer-count-badge">Loading…</span>
    <span class="badge" id="vertical-count-badge"></span>
    <span class="badge" id="entry-count-badge"></span>
    <span class="badge" id="org-count-badge"></span>
    <span class="badge" id="last-updated"></span>
  </div>

</div>

<script>
const SHEET_ID = '1yYDiayOy2ReCqcbBjUYTi9czT9pLElt5Kuks42WroE0';

const VERTICAL_PALETTE = [
  { header: '#1a4540', accent: '#39766d' },
  { header: '#3f4a12', accent: '#7b9108' },
  { header: '#352a58', accent: '#6b52c4' },
  { header: '#1e3a36', accent: '#2d6a4f' },
  { header: '#4a1f2e', accent: '#9f1239' },
  { header: '#123836', accent: '#115e59' }
];

const LAYER_BAND_PALETTE = [
  { bg: '#141513', color: '#ffffff' },
  { bg: '#39766d', color: '#ffffff' },
  { bg: '#2a2f28', color: '#ffffff' },
  { bg: '#1e3a36', color: '#ffffff' },
  { bg: '#3d2b32', color: '#ffffff' },
  { bg: '#1a2e2c', color: '#ffffff' }
];

const LAYER_CELL_LIGHTNESS = [86, 79, 72];

const STATUS_DOT_COLORS = [
  'var(--gray-200)',
  'var(--green-600)',
  'var(--gray-100)',
  'var(--gray-600)'
];

async function fetchSheet(tabName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(tabName)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status} for ${tabName}`);
  const text = await res.text();
  const json = JSON.parse(text.substring(47).slice(0, -2));
  const rawRows = json.table.rows.filter(r => r.c && r.c.some(cell => cell && cell.v !== null));

  let cols = json.table.cols.map(c => c.label);
  let dataRows = rawRows;

  if (cols.every(label => !label) && rawRows.length > 0) {
    cols = rawRows[0].c.map(cell => (cell && cell.v != null) ? String(cell.v) : '');
    dataRows = rawRows.slice(1);
  }

  return dataRows.map(r => {
    const obj = {};
    r.c.forEach((cell, i) => { if (cols[i]) obj[cols[i]] = cell ? cell.v : null; });
    return obj;
  });
}

function hexToHsl(hex) {
  const n = parseInt(hex.replace('#', ''), 16);
  const r = ((n >> 16) & 255) / 255;
  const g = ((n >> 8) & 255) / 255;
  const b = (n & 255) / 255;
  const max = Math.max(r, g, b);
  const min = Math.min(r, g, b);
  const l = (max + min) / 2;
  if (max === min) return { h: 0, s: 0, l: l * 100 };
  const d = max - min;
  const s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
  let h;
  switch (max) {
    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
    case g: h = ((b - r) / d + 2) / 6; break;
    default: h = ((r - g) / d + 4) / 6;
  }
  return { h: h * 360, s: s * 100, l: l * 100 };
}

function hslToHex(h, s, l) {
  s /= 100;
  l /= 100;
  const c = (1 - Math.abs(2 * l - 1)) * s;
  const x = c * (1 - Math.abs((h / 60) % 2 - 1));
  const m = l - c / 2;
  let r, g, b;
  if (h < 60) [r, g, b] = [c, x, 0];
  else if (h < 120) [r, g, b] = [x, c, 0];
  else if (h < 180) [r, g, b] = [0, c, x];
  else if (h < 240) [r, g, b] = [0, x, c];
  else if (h < 300) [r, g, b] = [x, 0, c];
  else [r, g, b] = [c, 0, x];
  const toHex = v => Math.round((v + m) * 255).toString(16).padStart(2, '0');
  return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
}

function layerCellLightness(layerIndex, layerCount) {
  if (layerCount <= 1) return LAYER_CELL_LIGHTNESS[0];
  if (layerIndex < LAYER_CELL_LIGHTNESS.length) return LAYER_CELL_LIGHTNESS[layerIndex];
  const step = (LAYER_CELL_LIGHTNESS[0] - LAYER_CELL_LIGHTNESS[LAYER_CELL_LIGHTNESS.length - 1]) / (layerCount - 1);
  return LAYER_CELL_LIGHTNESS[0] - step * layerIndex;
}

function verticalTheme(palette, layerIndex, layerCount) {
  const { h, s } = hexToHsl(palette.accent);
  const cellLightness = layerCellLightness(layerIndex, layerCount);
  return {
    headerBg: palette.header,
    headerColor: '#ffffff',
    cellBg: hslToHex(h, Math.max(s, 32), cellLightness)
  };
}

function parseGlossary(rows) {
  const map = {};
  rows.forEach(row => {
    if (row['Term']) map[row['Term']] = row['Description'] || '';
  });
  return map;
}

function applyPageCopy(glossary) {
  const header = glossary['Header'] || 'Dutch IX industry map';
  const subheader = glossary['Subheader'] || '';
  const intro = glossary['Intro'] || '';

  document.title = header;
  document.getElementById('page-header').textContent = header;
  document.getElementById('page-subheader').textContent = subheader;
  document.getElementById('page-intro').textContent = intro;
}

let glossaryPopover = null;
let glossaryHideTimer = null;
let glossaryPinned = false;

function initGlossaryPopover() {
  if (glossaryPopover) return;
  glossaryPopover = document.createElement('div');
  glossaryPopover.id = 'glossary-popover';
  glossaryPopover.className = 'glossary-popover';
  glossaryPopover.hidden = true;
  glossaryPopover.innerHTML = '<div class="glossary-popover-title"></div><div class="glossary-popover-body"></div>';
  document.body.appendChild(glossaryPopover);

  glossaryPopover.addEventListener('mouseenter', () => clearTimeout(glossaryHideTimer));
  glossaryPopover.addEventListener('mouseleave', () => {
    if (!glossaryPinned) hideGlossaryPopover();
  });

  document.addEventListener('click', (e) => {
    if (glossaryPinned && !e.target.closest('.glossary-tip') && !e.target.closest('.glossary-popover')) {
      glossaryPinned = false;
      hideGlossaryPopover();
    }
  });
}

function resolveGlossaryText(glossary, keys, fallback) {
  for (const key of keys) {
    if (glossary[key]) return { term: key, text: glossary[key] };
  }
  if (fallback) return { term: keys[0] || 'Info', text: fallback };
  return null;
}

function positionGlossaryPopover(el) {
  const rect = el.getBoundingClientRect();
  const pop = glossaryPopover;
  pop.hidden = false;
  const margin = 10;
  let top = rect.bottom + margin;
  let left = rect.left + rect.width / 2 - pop.offsetWidth / 2;

  if (left + pop.offsetWidth > window.innerWidth - margin) {
    left = window.innerWidth - pop.offsetWidth - margin;
  }
  if (left < margin) left = margin;

  if (top + pop.offsetHeight > window.innerHeight - margin) {
    top = rect.top - pop.offsetHeight - margin;
  }

  pop.style.top = `${top}px`;
  pop.style.left = `${left}px`;
}

function showGlossaryPopover(el, term, text) {
  if (!text) return;
  clearTimeout(glossaryHideTimer);
  initGlossaryPopover();
  glossaryPopover.querySelector('.glossary-popover-title').textContent = term;
  glossaryPopover.querySelector('.glossary-popover-body').textContent = text;
  glossaryPopover.hidden = false;
  positionGlossaryPopover(el);
}

function formatRecordCount(count) {
  return `${count} Record${count !== 1 ? 's' : ''}`;
}

function showEntryPopover(el, entry, layer, vertical, count) {
  clearTimeout(glossaryHideTimer);
  initGlossaryPopover();

  const title = (entry['Entry'] || '').replace(/\*+$/, '').trim();
  glossaryPopover.querySelector('.glossary-popover-title').textContent = title;

  const body = glossaryPopover.querySelector('.glossary-popover-body');
  body.innerHTML = '';

  const description = entry['Description'] || '';
  if (description) {
    const desc = document.createElement('p');
    desc.className = 'glossary-popover-desc';
    desc.textContent = description;
    body.appendChild(desc);
  }

  const meta = document.createElement('div');
  meta.className = 'glossary-popover-meta';

  const verticalLine = document.createElement('div');
  verticalLine.innerHTML = '<strong>Vertical:</strong> ';
  verticalLine.append(document.createTextNode(vertical.name));

  const layerLine = document.createElement('div');
  layerLine.innerHTML = '<strong>Layer:</strong> ';
  layerLine.append(document.createTextNode(layer.name));

  const recordsLine = document.createElement('div');
  recordsLine.textContent = formatRecordCount(count);

  meta.append(verticalLine, layerLine, recordsLine);
  body.appendChild(meta);

  glossaryPopover.hidden = false;
  positionGlossaryPopover(el);
}

function hideGlossaryPopover() {
  clearTimeout(glossaryHideTimer);
  if (glossaryPopover) glossaryPopover.hidden = true;
}

function scheduleHideGlossaryPopover() {
  clearTimeout(glossaryHideTimer);
  if (!glossaryPinned) {
    glossaryHideTimer = setTimeout(hideGlossaryPopover, 120);
  }
}

function attachPopoverTip(el, open) {
  el.classList.add('glossary-tip');
  el.setAttribute('tabindex', '0');
  el.setAttribute('role', 'button');
  el.setAttribute('aria-describedby', 'glossary-popover');

  const pin = (e) => {
    e.stopPropagation();
    glossaryPinned = !glossaryPinned;
    if (glossaryPinned) open();
    else hideGlossaryPopover();
  };

  el.addEventListener('mouseenter', open);
  el.addEventListener('mouseleave', scheduleHideGlossaryPopover);
  el.addEventListener('focus', open);
  el.addEventListener('blur', scheduleHideGlossaryPopover);
  el.addEventListener('click', pin);
  el.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      pin(e);
    }
  });
}

function attachGlossaryTip(el, glossary, keys, fallback, showIcon) {
  const resolved = resolveGlossaryText(glossary, keys, fallback);
  if (!resolved || !resolved.text) return;

  if (showIcon) {
    const icon = document.createElement('span');
    icon.className = 'tip-icon';
    icon.textContent = '?';
    icon.setAttribute('aria-hidden', 'true');
    el.appendChild(icon);
  }

  attachPopoverTip(el, () => showGlossaryPopover(el, resolved.term, resolved.text));
}

function attachEntryTip(el, entry, layer, vertical, count) {
  attachPopoverTip(el, () => showEntryPopover(el, entry, layer, vertical, count));
}

function layerGlossaryKeys(layer) {
  return [layer.name, layer.name.replace(/\s*layer\s*$/i, ' Layer'), 'Layer'];
}

function verticalGlossaryKeys(vertical) {
  return [`${vertical.name} vertical`, vertical.name, 'Vertical'];
}

function statusDotColor(statusLabel, index) {
  const label = (statusLabel || '').toLowerCase();
  if (label.includes('validated')) return 'var(--ciiic-success)';
  if (label.includes('only international')) return 'var(--ciiic-gray-600)';
  if (label.includes('not active')) return 'var(--gray-100)';
  if (label.includes('under review') || label.includes('review')) return 'var(--ciiic-warning)';
  return STATUS_DOT_COLORS[index % STATUS_DOT_COLORS.length];
}

function renderFooterNote(glossary) {
  const footerNote = document.getElementById('footer-note');
  if (!footerNote) return;
  footerNote.innerHTML = '';

  const star = document.createElement('span');
  star.textContent = '*';
  if (glossary['* (asterisk on entry)']) {
    attachGlossaryTip(star, glossary, ['* (asterisk on entry)'], glossary['* (asterisk on entry)'], false);
  }
  footerNote.appendChild(star);
  footerNote.append(' active across multiple verticals \u00a0·\u00a0 ');

  const copyright = document.createElement('span');
  copyright.textContent = glossary['Copyright'] || '';
  footerNote.appendChild(copyright);
}

function renderLegend(statuses, glossary) {
  const legend = document.getElementById('legend');
  legend.innerHTML = '';

  statuses.forEach((status, index) => {
    const item = document.createElement('div');
    item.className = 'legend-item';

    const dot = document.createElement('div');
    dot.className = 'legend-dot';
    dot.style.background = statusDotColor(status.label, index);

    const label = document.createElement('span');
    label.textContent = status.label;

    item.appendChild(dot);
    item.appendChild(label);
    attachGlossaryTip(item, glossary, [status.label, 'Entry'], status.description, false);
    legend.appendChild(item);
  });
}

function renderMatrix(layers, verticals, entries, statusMap, statusIndexById, orgCountMap, glossary) {
  const body = document.getElementById('matrix-body');
  body.innerHTML = '';

  layers.forEach((layer, layerIndex) => {
    const block = document.createElement('div');
    block.className = 'layer-block';

    const bandPalette = LAYER_BAND_PALETTE[layerIndex % LAYER_BAND_PALETTE.length];
    const band = document.createElement('div');
    band.className = 'layer-band';
    band.style.background = bandPalette.bg;
    band.style.color = bandPalette.color;
    band.appendChild(document.createTextNode(layer.name));
    attachGlossaryTip(band, glossary, layerGlossaryKeys(layer), layer.description, true);
    block.appendChild(band);

    const headRow = document.createElement('div');
    headRow.className = 'matrix-row';

    verticals.forEach((vertical, verticalIndex) => {
      const palette = VERTICAL_PALETTE[verticalIndex % VERTICAL_PALETTE.length];
      const theme = verticalTheme(palette, layerIndex, layers.length);
      const col = document.createElement('div');
      col.className = 'col-head';
      col.style.background = theme.headerBg;
      col.style.color = theme.headerColor;
      col.appendChild(document.createTextNode(vertical.name));
      attachGlossaryTip(col, glossary, verticalGlossaryKeys(vertical), vertical.description, true);
      headRow.appendChild(col);
    });
    block.appendChild(headRow);

    const contentRow = document.createElement('div');
    contentRow.className = 'matrix-row';

    verticals.forEach((vertical, verticalIndex) => {
      const cell = document.createElement('div');
      cell.className = 'cell';
      const palette = VERTICAL_PALETTE[verticalIndex % VERTICAL_PALETTE.length];
      const theme = verticalTheme(palette, layerIndex, layers.length);
      cell.style.background = theme.cellBg;

      const cellEntries = entries.filter(e => e['Layer'] === layer.id && e['Vertical'] === vertical.id);

      cellEntries.forEach(entry => {
        const statusId = entry['Validation Status'];
        const statusLabel = statusMap[statusId] || '';
        const statusIndex = statusIndexById[statusId] ?? 0;
        const count = orgCountMap[entry['Entry_ID']] || 0;

        const el = document.createElement('div');
        el.className = 'entry';

        const dot = document.createElement('div');
        dot.className = 'dot';
        dot.style.background = statusDotColor(statusLabel, statusIndex);

        const text = document.createElement('div');
        text.className = 'entry-text';

        const name = document.createElement('div');
        name.className = 'entry-name';
        name.textContent = entry['Entry'] || '';

        const countBadge = document.createElement('div');
        countBadge.className = 'entry-count';
        countBadge.textContent = count === 0 ? '0 records' : `${count} record${count > 1 ? 's' : ''}`;

        text.appendChild(name);
        text.appendChild(countBadge);
        el.appendChild(dot);
        el.appendChild(text);
        attachEntryTip(el, entry, layer, vertical, count);

        cell.appendChild(el);
      });

      if (cellEntries.length === 0) {
        cell.innerHTML = '<span style="font-size:11px;color:var(--gray-200);">—</span>';
      }

      contentRow.appendChild(cell);
    });

    block.appendChild(contentRow);
    body.appendChild(block);
  });
}

async function init() {
  try {
    const [layersRaw, verticalsRaw, entries, orgEntries, statusesRaw, glossaryRaw] = await Promise.all([
      fetchSheet('Layers'),
      fetchSheet('Verticals'),
      fetchSheet('Entries'),
      fetchSheet('Org_Entries'),
      fetchSheet('ReviewStatuses'),
      fetchSheet('Glossary')
    ]);

    const glossary = parseGlossary(glossaryRaw);
    applyPageCopy(glossary);
    initGlossaryPopover();

    const layers = layersRaw
      .filter(row => row['Layer_ID'])
      .map(row => ({
        id: row['Layer_ID'],
        name: row['Layer'] || row['Layer_ID'],
        description: row['Description'] || ''
      }));

    const verticals = verticalsRaw
      .filter(row => row['Vertical_ID'])
      .map(row => ({
        id: row['Vertical_ID'],
        name: row['Vertical'] || row['Vertical_ID'],
        description: row['Description'] || ''
      }));

    const statuses = statusesRaw
      .filter(row => row['ReviewStatus_ID'])
      .map(row => ({
        id: row['ReviewStatus_ID'],
        label: row['Review Status'] || row['ReviewStatus_ID'],
        description: row['Description'] || ''
      }));

    const statusMap = {};
    const statusIndexById = {};
    statuses.forEach((status, index) => {
      statusMap[status.id] = status.label;
      statusIndexById[status.id] = index;
    });

    const orgCountMap = {};
    orgEntries.forEach(link => {
      const eid = link['Entry_ID'];
      if (eid) orgCountMap[eid] = (orgCountMap[eid] || 0) + 1;
    });

    document.documentElement.style.setProperty('--vertical-count', verticals.length);

    document.getElementById('layer-count-badge').textContent = `${layers.length} layer${layers.length !== 1 ? 's' : ''}`;
    document.getElementById('vertical-count-badge').textContent = `${verticals.length} vertical${verticals.length !== 1 ? 's' : ''}`;
    document.getElementById('entry-count-badge').textContent = `${entries.length} entr${entries.length !== 1 ? 'ies' : 'y'}`;
    const totalOrgs = new Set(orgEntries.map(l => l['Organization_ID']).filter(Boolean)).size;
    document.getElementById('org-count-badge').textContent = `${totalOrgs} organisation${totalOrgs !== 1 ? 's' : ''}`;
    document.getElementById('last-updated').textContent = `Updated ${new Date().toLocaleDateString('en-NL', { day: 'numeric', month: 'short', year: 'numeric' })}`;

    renderLegend(statuses, glossary);
    renderFooterNote(glossary);
    renderMatrix(layers, verticals, entries, statusMap, statusIndexById, orgCountMap, glossary);

  } catch (e) {
    document.getElementById('matrix-body').innerHTML = `<div class="error">Could not load data. Make sure the Google Sheet is publicly readable (Share → Anyone with the link → Viewer).<br><br>Error: ${e.message}</div>`;
    console.error(e);
  }
}

init();
</script>

</html>
